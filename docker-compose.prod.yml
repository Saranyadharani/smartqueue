services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://neon_user:password@your-neon-host/dbname
      - REDIS_URL=redis://redis:6379
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7-alpine
    restart: always