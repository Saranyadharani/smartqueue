<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQueue - Async Task Processing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .job-row { transition: all 0.2s ease; }
        .job-row:hover { background: rgba(75, 85, 99, 0.3); }
        .progress-bar { transition: width 0.3s ease; }
        .tab-active { background: #534AB7; color: white; }
        .tab-inactive { background: #1f2937; color: #9ca3af; }
        .worker-card { transition: all 0.2s ease; }
        .worker-busy { border-left: 4px solid #f59e0b; background: #1e293b; }
        .worker-idle { border-left: 4px solid #10b981; background: #0f172a; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #534AB7; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100">

<div class="max-w-7xl mx-auto px-4 py-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent">
                SmartQueue
            </h1>
            <p class="text-gray-500 text-sm mt-1">Async Task Processing System</p>
        </div>
        <div class="flex gap-2">
            <div class="bg-green-900/30 text-green-400 px-3 py-1 rounded-full text-xs flex items-center gap-1">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                SYSTEM ONLINE
            </div>
        </div>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-6 gap-4 mb-6">
        <div class="bg-gray-900 rounded-lg p-4 border border-gray-800">
            <div class="text-gray-500 text-xs">SUBMITTED</div>
            <div class="text-2xl font-bold" id="statSubmitted">0</div>
        </div>
        <div class="bg-gray-900 rounded-lg p-4 border border-gray-800">
            <div class="text-gray-500 text-xs">PENDING</div>
            <div class="text-2xl font-bold text-yellow-400" id="statPending">0</div>
        </div>
        <div class="bg-gray-900 rounded-lg p-4 border border-gray-800">
            <div class="text-gray-500 text-xs">RUNNING</div>
            <div class="text-2xl font-bold text-blue-400" id="statRunning">0</div>
        </div>
        <div class="bg-gray-900 rounded-lg p-4 border border-gray-800">
            <div class="text-gray-500 text-xs">COMPLETED</div>
            <div class="text-2xl font-bold text-green-400" id="statCompleted">0</div>
        </div>
        <div class="bg-gray-900 rounded-lg p-4 border border-gray-800">
            <div class="text-gray-500 text-xs">FAILED</div>
            <div class="text-2xl font-bold text-red-400" id="statFailed">0</div>
        </div>
        <div class="bg-gray-900 rounded-lg p-4 border border-gray-800">
            <div class="text-gray-500 text-xs">QUEUE DEPTH</div>
            <div class="text-2xl font-bold" id="statQueueDepth">0</div>
        </div>
    </div>

    <!-- Workers Row -->
    <div class="mb-6">
        <h3 class="text-sm font-semibold text-gray-400 mb-3">WORKERS</h3>
        <div class="grid grid-cols-3 gap-4" id="workersContainer"></div>
    </div>

    <!-- Job Submission Card -->
    <div class="bg-gray-900 rounded-xl border border-gray-800 p-6 mb-6">
        <div class="flex gap-2 mb-6 border-b border-gray-800">
            <button class="job-tab px-4 py-2 rounded-t-lg text-sm font-medium transition tab-active bg-purple-600 text-white" data-type="email">Email</button>
            <button class="job-tab px-4 py-2 rounded-t-lg text-sm font-medium transition tab-inactive bg-gray-800 text-gray-400" data-type="image_resize">Image</button>
            <button class="job-tab px-4 py-2 rounded-t-lg text-sm font-medium transition tab-inactive bg-gray-800 text-gray-400" data-type="qrcode">QR Code</button>
        </div>

        <!-- Email Form - Clean Version (No Tips) -->
        <div id="email-form" class="job-form">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-gray-400 text-sm mb-1">To (Email)</label>
                    <input type="email" id="emailTo" placeholder="recipient@example.com" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white">
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Subject</label>
                    <input type="text" id="emailSubject" placeholder="Email Subject" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white">
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-1">Message</label>
                <textarea id="emailBody" rows="5" placeholder="Enter your message here..." class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white"></textarea>
            </div>
        </div>

        <!-- Image Form -->
        <div id="image-form" class="job-form" style="display: none;">
            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-1">Upload Image</label>
                <input type="file" id="imageFile" accept="image/*" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white">
                <div class="text-xs text-gray-500 mt-1">Upload first, then queue resize job</div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Width (px)</label>
                    <input type="number" id="imageWidth" value="800" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white">
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Height (px)</label>
                    <input type="number" id="imageHeight" value="600" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white">
                </div>
            </div>
            <div class="mt-3">
                <label class="flex items-center gap-2">
                    <input type="checkbox" id="keepAspect" class="rounded bg-gray-800 border-gray-700">
                    <span class="text-sm text-gray-400">Keep aspect ratio</span>
                </label>
            </div>
            <div id="uploadStatus" class="mt-3 text-sm"></div>
        </div>

        <!-- QR Code Form -->
        <div id="qrcode-form" class="job-form" style="display: none;">
            <div class="space-y-3">
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Data (URL or Text)</label>
                    <input type="text" id="qrData" value="https://github.com/yourusername/smartqueue" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white">
                </div>
            </div>
        </div>

        <!-- Priority & Submit -->
        <div class="flex items-center justify-between mt-6 pt-4 border-t border-gray-800">
            <div class="flex gap-2">
                <button data-priority="1" class="priority-btn px-4 py-2 rounded-lg text-sm bg-gray-800 hover:bg-gray-700 transition">LOW</button>
                <button data-priority="2" class="priority-btn px-4 py-2 rounded-lg text-sm bg-purple-600 text-white transition">MED</button>
                <button data-priority="3" class="priority-btn px-4 py-2 rounded-lg text-sm bg-gray-800 hover:bg-gray-700 transition">HIGH</button>
            </div>
            <button onclick="submitJob()" class="bg-purple-600 hover:bg-purple-700 px-6 py-2 rounded-lg font-semibold transition">
                ↗ Queue Job
            </button>
        </div>
    </div>

    <!-- Jobs Table -->
    <div>
        <div class="flex items-center justify-between mb-3">
            <h3 class="text-sm font-semibold text-gray-400">JOBS</h3>
            <div class="flex gap-2">
                <button class="filter-btn px-3 py-1 rounded text-xs bg-purple-600" data-status="all">All</button>
                <button class="filter-btn px-3 py-1 rounded text-xs bg-gray-800" data-status="pending">Pending</button>
                <button class="filter-btn px-3 py-1 rounded text-xs bg-gray-800" data-status="running">Running</button>
                <button class="filter-btn px-3 py-1 rounded text-xs bg-gray-800" data-status="completed">Completed</button>
                <button class="filter-btn px-3 py-1 rounded text-xs bg-gray-800" data-status="failed">Failed</button>
            </div>
        </div>
        <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="border-b border-gray-800">
                    <tr class="text-left text-gray-500">
                        <th class="px-4 py-3">Job ID</th>
                        <th class="px-4 py-3">Type</th>
                        <th class="px-4 py-3">Priority</th>
                        <th class="px-4 py-3">Status</th>
                        <th class="px-4 py-3">Worker</th>
                        <th class="px-4 py-3">Progress</th>
                        <th class="px-4 py-3">Result</th>
                        <th class="px-4 py-3">Actions</th>
                    </tr>
                </thead>
                <tbody id="jobsTable">
                    <tr><td colspan="8" class="text-center py-8 text-gray-500">No jobs</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let currentPriority = 2;
    let currentFilter = 'all';
    let uploadedFilename = null;
    let pollingInterval = null;

    document.querySelectorAll('.priority-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.priority-btn').forEach(b => {
                b.classList.remove('bg-purple-600', 'text-white');
                b.classList.add('bg-gray-800');
            });
            btn.classList.remove('bg-gray-800');
            btn.classList.add('bg-purple-600', 'text-white');
            currentPriority = parseInt(btn.dataset.priority);
        });
    });

    document.querySelectorAll('.job-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const type = tab.dataset.type;
            document.querySelectorAll('.job-tab').forEach(t => {
                t.classList.remove('tab-active', 'bg-purple-600', 'text-white');
                t.classList.add('tab-inactive', 'bg-gray-800', 'text-gray-400');
            });
            tab.classList.remove('tab-inactive', 'bg-gray-800', 'text-gray-400');
            tab.classList.add('tab-active', 'bg-purple-600', 'text-white');
            
            document.querySelectorAll('.job-form').forEach(form => form.style.display = 'none');
            if (type === 'email') document.getElementById('email-form').style.display = 'block';
            if (type === 'image_resize') document.getElementById('image-form').style.display = 'block';
            if (type === 'qrcode') document.getElementById('qrcode-form').style.display = 'block';
        });
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentFilter = btn.dataset.status;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('bg-purple-600');
                b.classList.add('bg-gray-800');
            });
            btn.classList.remove('bg-gray-800');
            btn.classList.add('bg-purple-600');
            loadJobs();
        });
    });

    const fileInput = document.getElementById('imageFile');
    if (fileInput) {
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                uploadedFilename = data.filename;
                document.getElementById('uploadStatus').innerHTML = `<span class="text-green-400">✓ Uploaded: ${uploadedFilename}</span>`;
            } catch (err) {
                document.getElementById('uploadStatus').innerHTML = `<span class="text-red-400">✗ Upload failed</span>`;
            }
        });
    }

    async function submitJob() {
        const activeTab = document.querySelector('.job-tab.tab-active');
        if (!activeTab) return;
        const jobType = activeTab.dataset.type;
        let payload = {};
        
        if (jobType === 'email') {
            const message = document.getElementById('emailBody').value || 'Hello from SmartQueue!';
            const htmlMessage = message.replace(/\n/g, '<br>').replace(/\r/g, '');
            payload = {
                to: document.getElementById('emailTo').value,
                subject: document.getElementById('emailSubject').value || 'Message from SmartQueue',
                body: `<p style="font-family: Arial, sans-serif; font-size: 14px; line-height: 1.6;">${htmlMessage}</p>`
            };
            if (!payload.to) {
                alert('Please enter recipient email');
                return;
            }
        } else if (jobType === 'image_resize') {
            if (!uploadedFilename) {
                alert('Please upload an image first');
                return;
            }
            payload = {
                filename: uploadedFilename,
                width: parseInt(document.getElementById('imageWidth').value) || 800,
                height: parseInt(document.getElementById('imageHeight').value) || 600,
                keep_aspect: document.getElementById('keepAspect').checked
            };
        } else if (jobType === 'qrcode') {
            payload = {
                data: document.getElementById('qrData').value || 'https://github.com/yourusername/smartqueue'
            };
        }
        
        try {
            const res = await fetch('/api/jobs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ job_type: jobType, payload, priority: currentPriority })
            });
            if (!res.ok) {
                const err = await res.json();
                alert('Error: ' + JSON.stringify(err));
                return;
            }
            const data = await res.json();
            showToast(`Job ${data.job_id} queued`);
            loadJobs();
            loadStats();
            loadWorkers();
        } catch (err) {
            alert('Submission failed: ' + err.message);
        }
    }
    
    async function cancelJob(jobId) {
        if (!confirm('Cancel this job?')) return;
        try {
            await fetch(`/api/jobs/${jobId}`, { method: 'DELETE' });
            showToast(`Job ${jobId} cancelled`);
            loadJobs();
            loadStats();
            loadWorkers();
        } catch (err) {
            alert('Cancel failed');
        }
    }
    
    async function loadWorkers() {
        try {
            const res = await fetch('/api/workers');
            const workers = await res.json();
            const container = document.getElementById('workersContainer');
            container.innerHTML = '';
            for (const [name, data] of Object.entries(workers)) {
                const isBusy = data.status === 'busy';
                container.innerHTML += `
                    <div class="worker-card ${isBusy ? 'worker-busy' : 'worker-idle'} rounded-lg p-4">
                        <div class="flex items-center justify-between mb-2">
                            <span class="font-mono font-semibold">${name}</span>
                            <span class="text-xs px-2 py-1 rounded ${isBusy ? 'bg-orange-900/50 text-orange-400' : 'bg-green-900/50 text-green-400'}">
                                ${data.status}
                            </span>
                        </div>
                        <div class="text-2xl font-bold">${data.processed}</div>
                        <div class="text-xs text-gray-500">jobs processed</div>
                        ${data.current_job ? `<div class="mt-2 text-xs text-gray-400">Current: ${data.current_job}</div>` : ''}
                    </div>
                `;
            }
        } catch (err) { console.error(err); }
    }
    
    async function loadStats() {
        try {
            const res = await fetch('/api/stats');
            const stats = await res.json();
            document.getElementById('statSubmitted').innerText = stats.total_submitted || 0;
            document.getElementById('statPending').innerText = stats.pending || 0;
            document.getElementById('statRunning').innerText = stats.running || 0;
            document.getElementById('statCompleted').innerText = stats.total_completed || 0;
            document.getElementById('statFailed').innerText = stats.total_failed || 0;
            document.getElementById('statQueueDepth').innerText = stats.queue_depth || 0;
        } catch (err) { console.error(err); }
    }
    
    async function loadJobs() {
        try {
            let url = '/api/jobs';
            if (currentFilter !== 'all') url += `?status=${currentFilter}`;
            const res = await fetch(url);
            const jobs = await res.json();
            const tbody = document.getElementById('jobsTable');
            if (!jobs.length) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-gray-500">No jobs</td></tr>';
                return;
            }
            tbody.innerHTML = jobs.map(job => {
                const progress = job.progress || 0;
                const typeLabel = job.job_type === 'email' ? '📧 Email' : (job.job_type === 'image_resize' ? '🖼️ Image' : '🔲 QR');
                const statusColor = job.status === 'completed' ? 'text-green-400' : (job.status === 'failed' ? 'text-red-400' : (job.status === 'running' ? 'text-blue-400' : 'text-yellow-400'));
                let resultHtml = job.result || '-';
                
                if (job.status === 'completed' && job.result && job.result.includes('/api/download/')) {
                    resultHtml = `<a href="${job.result}" class="text-purple-400 hover:underline" target="_blank">⬇ Download</a>`;
                }
                
                return `
                    <tr class="job-row border-b border-gray-800">
                        <td class="px-4 py-3 font-mono text-xs">#${job.id}</td>
                        <td class="px-4 py-3">${typeLabel}</td>
                        <td class="px-4 py-3">${job.priority === 3 ? '🔴 HIGH' : (job.priority === 2 ? '🟡 MED' : '🟢 LOW')}</td>
                        <td class="px-4 py-3 ${statusColor} font-medium">${job.status.toUpperCase()}</td>
                        <td class="px-4 py-3 font-mono text-xs">${job.worker || '-'}</td>
                        <td class="px-4 py-3 w-32">
                            <div class="bg-gray-700 rounded-full h-2 w-full">
                                <div class="progress-bar h-2 rounded-full ${job.status === 'completed' ? 'bg-green-500' : (job.status === 'failed' ? 'bg-red-500' : 'bg-purple-500')}" style="width: ${progress}%"></div>
                            </div>
                            <div class="text-xs text-gray-500 mt-1">${progress}%</div>
                        </td>
                        <td class="px-4 py-3 text-xs text-gray-400">${resultHtml}</td>
                        <td class="px-4 py-3">
                            ${job.status === 'pending' ? `<button onclick="cancelJob('${job.id}')" class="text-red-400 hover:text-red-300 text-xs">Cancel</button>` : '-'}
                        </td>
                    </tr>
                `;
            }).join('');
        } catch (err) { console.error(err); }
    }
    
    function showToast(msg) {
        let toast = document.getElementById('toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast';
            toast.className = 'fixed bottom-4 right-4 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg text-sm z-50';
            document.body.appendChild(toast);
        }
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }
    
    async function init() {
        await loadWorkers();
        await loadStats();
        await loadJobs();
        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(() => {
            loadWorkers();
            loadStats();
            loadJobs();
        }, 1500);
    }
    
    init();
</script>
</body>
</html>
